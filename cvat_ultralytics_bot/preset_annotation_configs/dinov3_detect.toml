tool = "dinov3_detect"

[dinov3_detect]
# ModelScope model ID
model_id = "facebook/dinov3-vit7b16-pretrain-lvd1689m"
# Device: "cpu" or "cuda"
device = "cpu"
# Confidence threshold
conf = 0.25
# Text prompt for detection (what objects to detect)
text_prompt = "object"

[dinov3_detect.label_map]
person = "person"
bicycle = "vehicle"
car = "vehicle"
motorcycle = "vehicle"
bus = "vehicle"
truck = "vehicle"

